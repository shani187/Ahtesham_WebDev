<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      color: #333;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #4f6ef7 0%, #6a3de8 100%);
      color: white;
      padding: 28px 24px 22px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(79,110,247,.35);
    }
    header h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 4px;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    /* ── Search bar ── */
    .search-wrapper {
      max-width: 960px;
      margin: 28px auto 0;
      padding: 0 16px;
    }
    .search-wrapper input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid #d0d9ff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      outline: none;
      background: white;
      transition: border-color 0.25s;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .search-wrapper input:focus { border-color: #4f6ef7; }

    /* ── Status messages ── */
    #status {
      text-align: center;
      margin: 40px 16px;
      font-size: 1rem;
    }
    #status.error {
      color: #e53935;
      font-weight: 600;
      background: #ffebee;
      padding: 14px 24px;
      border-radius: 12px;
      max-width: 500px;
      margin: 40px auto;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 22px;
      max-width: 960px;
      margin: 24px auto 48px;
      padding: 0 16px;
    }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px 22px 20px;
      box-shadow: 0 3px 12px rgba(0,0,0,.08);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(79,110,247,.18);
    }

    /* Special styling for zip starting with '5' */
    .card.special {
      border-color: #f7a04f;
      background: linear-gradient(160deg, #fffbf5 0%, #fff8ee 100%);
    }
    .card.special::after {
      content: "⭐ Featured";
      position: absolute;
      top: 14px; right: 14px;
      background: #f7a04f;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
    }

    /* Avatar circle */
    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f6ef7, #6a3de8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .card h2 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: #222;
      margin-bottom: 4px;
    }
    .card .email {
      font-size: 0.82rem;
      color: #5c6bc0;
      word-break: break-all;
      margin-bottom: 3px;
    }
    .card .city {
      font-size: 0.82rem;
      color: #888;
    }
    .card .city span { margin-right: 4px; }

    /* Show Details button */
    .btn-details {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #4f6ef7, #6a3de8);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-details:hover { opacity: 0.87; }

    /* Details panel */
    .details {
      display: none;
      margin-top: 14px;
      background: #f5f7ff;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.83rem;
      line-height: 1.7;
      color: #444;
      border-left: 4px solid #4f6ef7;
    }
    .details.open { display: block; }
    .details strong { color: #4f6ef7; }

    /* Loading spinner */
    .loader {
      text-align: center;
      margin-top: 60px;
      font-size: 0.95rem;
      color: #888;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #d0d9ff;
      border-top-color: #4f6ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>👥 Employee Dashboard</h1>
  <p>Showing employees with geo.lat &lt; 0 · sorted A–Z</p>
</header>

<div class="search-wrapper">
  <input type="text" id="searchInput" placeholder="🔍  Search by name or email…" oninput="renderCards()"/>
</div>

<div id="status" class="loader">
  <div class="spinner"></div>
  Loading employees…
</div>

<div class="grid" id="grid"></div>

<script>
  let allUsers = [];   // filtered (lat < 0), sorted A–Z
  let openId  = null;  // currently expanded card id

  // ── Fetch ──────────────────────────────────────────────
  async function fetchUsers() {
    try {
      const res  = await fetch('https://jsonplaceholder.typicode.com/users');
      if (!res.ok) throw new Error('Network error');
      const data = await res.json();

      // Filter lat < 0 and sort alphabetically
      allUsers = data
        .filter(u => parseFloat(u.address.geo.lat) < 0)
        .sort((a, b) => a.name.localeCompare(b.name));

      document.getElementById('status').style.display = 'none';
      renderCards();
    } catch (err) {
      const s = document.getElementById('status');
      s.className = 'error';
      s.textContent = '❌ Failed to fetch users. Please try again later.';
    }
  }

  // ── Render ─────────────────────────────────────────────
  function renderCards() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const grid  = document.getElementById('grid');

    const filtered = allUsers.filter(u =>
      u.name.toLowerCase().includes(query) ||
      u.email.toLowerCase().includes(query)
    );

    if (filtered.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:#888;grid-column:1/-1;margin-top:20px;">No users found.</p>';
      return;
    }

    grid.innerHTML = filtered.map(u => {
      const initials  = u.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const zip       = u.address.zipcode || '';
      const isSpecial = zip.trimStart().startsWith('5');
      const detOpen   = openId === u.id ? 'open' : '';
      const btnLabel  = openId === u.id ? 'Hide Details ▲' : 'Show Details ▼';

      return `
        <div class="card ${isSpecial ? 'special' : ''}" id="card-${u.id}">
          <div class="avatar">${initials}</div>
          <h2>${u.name}</h2>
          <div class="email">✉ ${u.email}</div>
          <div class="city"><span>📍</span>${u.address.city}</div>
          <button class="btn-details" onclick="toggleDetails(${u.id})">${btnLabel}</button>
          <div class="details ${detOpen}" id="det-${u.id}">
            <strong>Address:</strong><br>
            ${u.address.street}, ${u.address.suite}, ${u.address.city}<br>
            <strong>Zip:</strong> ${zip}<br><br>
            <strong>Company Phrase:</strong><br>
            "${u.company.catchPhrase}"
          </div>
        </div>`;
    }).join('');
  }

  // ── Toggle detail panel (one at a time) ───────────────
  function toggleDetails(id) {
    openId = (openId === id) ? null : id;
    renderCards();
  }

  // ── Boot ───────────────────────────────────────────────
  fetchUsers();
</script>
</body>
</html>
