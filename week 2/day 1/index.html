<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Treasure Hunt Game</title>
  <style>
    body {
      background-color: #f0f8ff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #333;
      font-size: 32px;
    }

    p {
      font-size: 16px;
      color: #555;
    }

    input {
      padding: 8px;
      font-size: 16px;
      width: 150px;
      border: 2px solid #aaa;
      border-radius: 4px;
    }

    button {
      padding: 8px 16px;
      font-size: 16px;
      margin-left: 8px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    button:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    #message {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      color: #333;
    }

    #attempts {
      font-size: 16px;
      margin-top: 10px;
      color: #555;
    }

    #playAgain {
      margin-top: 20px;
      background-color: #2196F3;
      display: none;
    }

    #playAgain:hover {
      background-color: #1976D2;
    }
  </style>
</head>
<body>

  <h1>🎯 Treasure Hunt</h1>
  <p>A treasure is hidden between <b>1</b> and <b>100</b>. Can you find it?</p>

  <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="100" />
  <button id="searchBtn" onclick="makeGuess()">Search</button>

  <p id="message"></p>
  <p id="attempts">Attempts remaining: 7</p>

  <button id="playAgain" onclick="resetGame()">Play Again</button>

  <script>
    var treasure;
    var attemptsLeft;

    function startGame() {
      treasure = Math.floor(Math.random() * 100) + 1;
      attemptsLeft = 7;
    }

    function makeGuess() {
      var input = document.getElementById("guessInput");
      var guess = parseInt(input.value);
      var message = document.getElementById("message");
      var attemptsText = document.getElementById("attempts");

      if (isNaN(guess) || guess < 1 || guess > 100) {
        message.style.color = "red";
        message.textContent = "Please enter a number between 1 and 100!";
        return;
      }

      attemptsLeft--;
      attemptsText.textContent = "Attempts remaining: " + attemptsLeft;

      if (guess === treasure) {
        message.style.color = "green";
        message.textContent = "Treasure Found! 🎉 The number was " + treasure;
        endGame();
      } else if (attemptsLeft === 0) {
        message.style.color = "red";
        message.textContent = "Game Over! 😢 The treasure was at " + treasure;
        endGame();
      } else if (guess > treasure) {
        message.style.color = "orange";
        message.textContent = "Too Far Ahead! Try a lower number.";
      } else {
        message.style.color = "blue";
        message.textContent = "Too Far Behind! Try a higher number.";
      }

      input.value = "";
    }

    function endGame() {
      document.getElementById("guessInput").disabled = true;
      document.getElementById("searchBtn").disabled = true;
      document.getElementById("playAgain").style.display = "inline-block";
    }

    function resetGame() {
      startGame();
      document.getElementById("guessInput").disabled = false;
      document.getElementById("guessInput").value = "";
      document.getElementById("searchBtn").disabled = false;
      document.getElementById("message").textContent = "";
      document.getElementById("attempts").textContent = "Attempts remaining: 7";
      document.getElementById("playAgain").style.display = "none";
    }

    // Press Enter to guess
    document.getElementById("guessInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") makeGuess();
    });

    startGame();
  </script>

</body>
</html>
