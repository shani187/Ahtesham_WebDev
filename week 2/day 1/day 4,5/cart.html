<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - ShopEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar injected by JS -->
  <div id="navbar-placeholder"></div>

  <!-- Hero banner -->
  <div class="page-hero">
    <div class="container">
      <h1>Your Cart</h1>
      <p>Review your selected items before checkout</p>
    </div>
  </div>

  <main class="page-main">
    <div class="container">
      <div class="cart-layout">
        <!-- Cart items -->
        <div id="cart-content">
          <!-- Rendered by JS -->
        </div>
        <!-- Summary sidebar -->
        <div id="cart-summary-wrap">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2024 <span>ShopEase</span>. Built with ❤️ for your shopping needs.</p>
  </footer>

  <script src="app.js"></script>
  <script>initCartPage();</script>
</body>
</html>
