<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - ShopEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Shop<span>Ease</span></div>
      <p class="auth-subtitle">Welcome back! Log in to your account</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>

        <div class="form-error" id="login-err" style="margin-bottom:12px"></div>

        <button type="submit" class="btn btn-primary btn-full">
          Log In →
        </button>
      </form>

      <p class="auth-alt">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </main>

  <script src="app.js"></script>
  <script>initLoginPage();</script>
</body>
</html>
