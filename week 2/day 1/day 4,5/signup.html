<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ShopEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Shop<span>Ease</span></div>
      <p class="auth-subtitle">Create your free account to start shopping</p>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" autocomplete="name">
          <div class="form-error" id="name-err"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" autocomplete="email">
          <div class="form-error" id="email-err"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
          <div class="form-error" id="pass-err"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password">
          <div class="form-error" id="confirm-err"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
          Create Account →
        </button>
      </form>

      <p class="auth-alt">Already have an account? <a href="login.html">Log In</a></p>
    </div>
  </main>

  <script src="app.js"></script>
  <script>initSignupPage();</script>
</body>
</html>
